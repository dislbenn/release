base_images:
  stolostron_builder_go1.25-linux:
    name: builder
    namespace: stolostron
    tag: go1.25-linux
build_root:
  image_stream_tag:
    name: builder
    namespace: stolostron
    tag: go1.25-linux
images:
- dockerfile_path: Dockerfile
  inputs:
    stolostron_builder_go1.25-linux:
      as:
      - registry.ci.openshift.org/stolostron/builder:go1.25-linux
  to: cluster-backup-controller
promotion:
  to:
  - name: '2.17'
    namespace: stolostron
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: crd-and-gen-files-check
  commands: "export SELF=\"make -f Makefile.prow\"\nexport HOME=\"/tmp\"\n# Check\
    \ that crd manifests are up-to-date\nmake -f Makefile.prow manifests\ndiff=$(git\
    \ diff --color --ignore-space-change config/crd/bases)\nif [ -n \"$diff\" ]; then\n\
    \  echo \"$diff\"\n  echo \"***** config/crd/bases is out-of-date *****\"\n  echo\
    \ \"*****     run 'make manifests'      *****\"\n  exit 1\nfi\n# Check that generated\
    \ deepcopy files are up-to-date\nmake -f Makefile.prow generate\ndiff=$(git diff\
    \ --color --ignore-space-change api/v1beta1/*generated*.go)\nif [ -n \"$diff\"\
    \ ]; then\n  echo \"$diff\"\n  echo \"***** api/v1beta1 generated files are out-of-date\
    \ *****\"\n  echo \"*****     run 'make generate'      *****\"\n  exit 1\nfi\n"
  container:
    from: src
- as: unit-tests
  commands: 'export SELF="make -f Makefile.prow"

    export HOME="/tmp"

    make -f Makefile.prow unit-tests

    '
  container:
    from: src
- as: sonar
  commands: 'export SONAR_GO_TEST_ARGS="-short ./..."

    export SELF="make -f /opt/build-harness/Makefile.prow"

    export HOME="/tmp"

    make -f /opt/build-harness/Makefile.prow sonar/go/prow

    '
  container:
    from: src
  secrets:
  - mount_path: /etc/sonarcloud/
    name: acm-sonarcloud-token
- as: sonar-post-submit
  commands: 'export SONAR_GO_TEST_ARGS="-short ./..."

    export SELF="make -f /opt/build-harness/Makefile.prow"

    export HOME="/tmp"

    make -f /opt/build-harness/Makefile.prow sonar/go/prow

    '
  container:
    from: src
  postsubmit: true
  secrets:
  - mount_path: /etc/sonarcloud/
    name: acm-sonarcloud-token
- as: pr-image-mirror
  steps:
    dependencies:
      SOURCE_IMAGE_REF: cluster-backup-controller
    env:
      IMAGE_REPO: cluster-backup-controller
      REGISTRY_ORG: stolostron
    workflow: ocm-ci-image-mirror
- as: pr-merge-image-mirror
  postsubmit: true
  steps:
    dependencies:
      SOURCE_IMAGE_REF: cluster-backup-controller
    env:
      IMAGE_REPO: cluster-backup-controller
      IMAGE_TAG: latest
      REGISTRY_ORG: stolostron
    workflow: ocm-ci-image-mirror
- as: fast-forward
  postsubmit: true
  steps:
    env:
      DESTINATION_BRANCH: release-2.17
    workflow: ocm-ci-fastforward
zz_generated_metadata:
  branch: main
  org: stolostron
  repo: cluster-backup-operator
